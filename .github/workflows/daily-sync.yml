name: Daily Property Sync
on:
  schedule:
    - cron: '0 6 * * *'  # 6am UTC daily
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node parse-feed.js
        env:
          FEED_URL: ${{ secrets.FEED_URL }}
      - run: |
          git config user.email "sync@avena-estate.com"
          git config user.name "Avena Sync Bot"
          git add public/data.json
          git diff --staged --quiet || git commit -m "Daily feed sync $(date +%Y-%m-%d)"
          git push
      - name: Check price drops and send alerts
        run: curl -s -X POST https://avena-estate.com/api/check-price-drops -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" | cat
